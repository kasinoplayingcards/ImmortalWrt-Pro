name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10

  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config

  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh

  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false

  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: 安全释放磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/share/swift

        sudo docker image prune --all --force || true

        sudo apt-get clean

        echo "========= 当前磁盘空间 ========="
        df -h

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' /etc/apt/sources.list
        sudo sed -i 's/security.ubuntu.com/archive.ubuntu.com/g' /etc/apt/sources.list

        sudo apt-get update

        sudo apt-get -y install --no-install-recommends \
        ack antlr3 asciidoc autoconf automake autopoint \
        binutils bison build-essential bzip2 ccache cmake \
        cpio curl device-tree-compiler fastjar flex gawk \
        gettext gcc-multilib g++-multilib git gperf haveged \
        help2man intltool libc6-dev-i386 libelf-dev \
        libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev \
        libmpc-dev libmpfr-dev libncurses5-dev \
        libncursesw5-dev libpython3-dev libreadline-dev \
        libssl-dev libtool lrzsz mkisofs msmtp ninja-build \
        p7zip p7zip-full patch pkgconf python3 \
        python3-pyelftools python3-setuptools python3-jinja2 qemu-utils \
        rsync scons squashfs-tools subversion swig texinfo \
        uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev ecj default-jre

        sudo apt-get autoremove --purge -y
        sudo apt-get clean

        sudo timedatectl set-timezone "$TZ"
        path: ${{ env.FIRMWARE }}
