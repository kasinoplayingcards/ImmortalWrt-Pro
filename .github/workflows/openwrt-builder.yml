name: ImmortalWrt Build

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Free space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo apt-get clean

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk git \
          libncurses5-dev libssl-dev python3 rsync unzip wget curl

      - name: Clone source
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: Update feeds
        run: |
          cp feeds.conf.default openwrt/feeds.conf.default
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply config
        run: |
          cp .config openwrt/
          cp -r files openwrt/
          cp diy-part1.sh openwrt/
          cp diy-part2.sh openwrt/
          cd openwrt
          chmod +x diy-part1.sh diy-part2.sh
          ./diy-part1.sh
          make defconfig

      - name: Download
        run: |
          cd openwrt
          make download -j8

      - name: Build
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Firmware
          path: openwrt/bin
