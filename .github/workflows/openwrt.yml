name: OpenWrt Build Stable EFI

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10

  TZ: Asia/Shanghai

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    # ================= 清理空间 =================

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        sudo docker image prune -af || true

        sudo apt-get clean

    # ================= 编译环境 =================

    - name: Initialization environment
      run: |
        sudo apt-get update

        sudo apt-get install -y \
        build-essential \
        clang \
        flex \
        bison \
        g++ \
        gawk \
        gcc-multilib \
        g++-multilib \
        gettext \
        git \
        libncurses5-dev \
        libssl-dev \
        python3 \
        python3-pip \
        rsync \
        unzip \
        zlib1g-dev \
        file \
        wget \
        curl \
        cmake \
        ninja-build \
        ccache \
        libelf-dev \
        ecj \
        fastjar \
        java-propose-classpath \
        python3-setuptools

    # ================= 拉源码 =================

    - name: Clone source
      run: |
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

        cd openwrt

        ./scripts/feeds clean || true

        rm -rf tmp
        rm -rf staging_dir
        rm -rf build_dir

    # ================= 复制配置 =================

    - name: Copy custom files
      run: |

        cp .config openwrt/.config

        cp feeds.conf.default openwrt/feeds.conf.default

        chmod +x diy-part1.sh || true
        chmod +x diy-part2.sh || true

        cp diy-part1.sh openwrt/
        cp diy-part2.sh openwrt/

    # ================= 更新 feeds =================

    - name: Update feeds
      run: |
        cd openwrt

        ./diy-part1.sh

        ./scripts/feeds update -a

        # 不再 install -a（防止 metadata 爆炸）

        ./scripts/feeds install luci
        ./scripts/feeds install packages
        ./scripts/feeds install nikki

        ./diy-part2.sh

    # ================= 生成配置 =================

    - name: Generate config
      run: |
        cd openwrt

        make defconfig

    # ================= 下载源码 =================

    - name: Download packages
      run: |
        cd openwrt

        make download -j8

    # ================= 修复 host 缓存 =================

    - name: Clean broken host cache
      run: |
        cd openwrt

        rm -rf build_dir/host/libtool-*
        rm -rf staging_dir/hostpkg
        rm -rf staging_dir/host

    # ================= 编译 =================

    - name: Compile firmware
      run: |
        cd openwrt

        make -j2 V=s

    # ================= 上传固件 =================

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-x86-64-EFI
        path: |
          openwrt/bin/targets/x86/64/*.img.gz
          openwrt/bin/targets/x86/64/*.manifest
          openwrt/bin/targets/x86/64/*.kernel
